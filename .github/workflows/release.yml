name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  PROJECT_NAME: claude-switch

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - darwin
          - linux
          - windows
        goarch:
          - amd64
          - arm64
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXTENSION=""
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
          fi
          OUTPUT_NAME="${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}${EXTENSION}"
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
          go build -ldflags="-s -w" -o "$OUTPUT_NAME" .

          # Package: tar.gz for unix, zip for windows
          if [ "$GOOS" = "windows" ]; then
            zip "${OUTPUT_NAME}.zip" "$OUTPUT_NAME"
          else
            tar czf "${OUTPUT_NAME}.tar.gz" "$OUTPUT_NAME"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          retention-days: 90

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          major=$(echo "$LAST_TAG" | cut -d. -f1 | tr -d v)
          minor=$(echo "$LAST_TAG" | cut -d. -f2)
          patch=$(echo "$LAST_TAG" | cut -d. -f3)
          new_patch=$((patch + 1))
          NEW_TAG="v${major}.${minor}.${new_patch}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Created tag: $NEW_TAG"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/${{ env.PROJECT_NAME }}-darwin-amd64/${{ env.PROJECT_NAME }}-darwin-amd64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-darwin-arm64/${{ env.PROJECT_NAME }}-darwin-arm64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-linux-amd64/${{ env.PROJECT_NAME }}-linux-amd64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-linux-arm64/${{ env.PROJECT_NAME }}-linux-arm64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-windows-amd64/${{ env.PROJECT_NAME }}-windows-amd64.zip
